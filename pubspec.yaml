name: home_pharmacy_manager
description: A comprehensive Android application for Home Pharmacy Management & Medication Reminders built with Clean Architecture.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ==================== CLEAN ARCHITECTURE & STATE MANAGEMENT ====================
  # BLoC/Cubit for state management
  flutter_bloc: ^8.1.3
  bloc: ^8.1.2
  equatable: ^2.0.5
  
  # Dependency Injection
  get_it: ^7.6.4
  injectable: ^2.3.2
  
  # ==================== LOCAL DATABASE (Offline-First) ====================
  # Isar - Fast NoSQL database for Flutter (recommended for this use case)
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1
  # Alternative: sqflite for relational data
  # sqflite: ^2.3.0
  # path: ^1.8.3
  
  # ==================== BARCODE SCANNING ====================
  mobile_scanner: ^3.5.5
  # Alternative: qr_code_scanner: ^1.0.1
  
  # ==================== OCR (Google ML Kit) ====================
  google_mlkit_text_recognition: ^0.11.0
  google_mlkit_commons: ^0.6.1
  
  # ==================== NOTIFICATIONS & BACKGROUND SERVICES ====================
  # Full-screen notifications with actionable buttons
  awesome_notifications: ^0.9.3+1
  # Background execution for notification actions
  flutter_local_notifications: ^16.3.2
  workmanager: ^0.5.2
  android_alarm_manager_plus: ^3.0.4
  
  # ==================== DATE & TIME HANDLING ====================
  intl: ^0.18.1
  timezone: ^0.9.2
  
  # ==================== UI COMPONENTS ====================
  cupertino_icons: ^1.0.6
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.1
  
  # ==================== UTILITY PACKAGES ====================
  dartz: ^0.10.1  # Functional programming (Either type for error handling)
  logger: ^2.0.2+1
  shared_preferences: ^2.2.2
  permission_handler: ^11.1.0
  package_info_plus: ^5.0.1
  
  # ==================== FUTURE: DRUG INTERACTIONS ====================
  # Ready for API integration when needed
  http: ^1.1.2
  dio: ^5.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  
  # Code Generation
  build_runner: ^2.4.8
  injectable_generator: ^2.4.1
  isar_generator: ^3.1.0+1
  
  # Linting
  flutter_lints: ^3.0.1
  mockito: ^5.4.4
  mocktail: ^1.0.2

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
    
  # fonts:
  #   - family: Roboto
  #     fonts:
  #       - asset: fonts/Roboto-Regular.ttf
  #       - asset: fonts/Roboto-Bold.ttf
  #         weight: 700
